# =============================================================================
# Tail Sampling — Smart decision at Collector level
# =============================================================================
# The Collector buffers complete traces and decides AFTER seeing all spans.
# This lets you keep 100% of errors and slow traces while sampling healthy ones.
# =============================================================================

mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.96.0"

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    memory_limiter:
      check_interval: 1s
      limit_mib: 1024       # Higher for tail sampling (needs buffer)
      spike_limit_mib: 256

    batch:
      timeout: 5s
      send_batch_size: 1024

    # ===== TAIL SAMPLING PROCESSOR =====
    # Buffers traces for `decision_wait` then applies policies.
    # ALL policies are evaluated; a trace is kept if ANY policy matches.
    tail_sampling:
      decision_wait: 10s              # Wait 10s to collect full trace
      num_traces: 100000              # Max traces in memory
      expected_new_traces_per_sec: 100
      policies:
        # Policy 1: ALWAYS keep error traces
        - name: errors-policy
          type: status_code
          status_code:
            status_codes: [ERROR]

        # Policy 2: ALWAYS keep slow traces (>500ms)
        - name: latency-policy
          type: latency
          latency:
            threshold_ms: 500

        # Policy 3: Sample 5% of remaining (healthy) traces
        - name: probabilistic-policy
          type: probabilistic
          probabilistic:
            sampling_percentage: 5

  exporters:
    debug:
      verbosity: basic
    otlp/jaeger:
      endpoint: jaeger-collector.observability.svc.cluster.local:4317
      tls:
        insecure: true
    prometheus:
      endpoint: 0.0.0.0:8889
      namespace: otel

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, tail_sampling, batch]
        exporters: [otlp/jaeger, debug]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheus]

# Higher resources for tail sampling (trace buffering)
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1
    memory: 1Gi
