# =============================================================================
# Order Service — Entry point for the e-commerce demo
# =============================================================================
# Auto-instrumented by OTel Operator. Calls Payment + Inventory services.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: demo
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        team: platform
        environment: development
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
    spec:
      containers:
        - name: app
          image: python:3.12-slim
          command: ["/bin/sh", "-c", "pip install 'flask==2.3.3' 'werkzeug==2.3.7' requests && python /app/main.py"]
          ports:
            - containerPort: 8080
          env:
            - name: OTEL_SERVICE_NAME
              value: "order-service"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service.demo.svc.cluster.local:8081"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service.demo.svc.cluster.local:8082"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: app-code
              mountPath: /app
      volumes:
        - name: app-code
          configMap:
            name: order-service-code
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-code
  namespace: demo
data:
  main.py: |
    import os
    import json
    import time
    import random
    import logging
    from flask import Flask, request, jsonify
    import requests

    app = Flask(__name__)
    logging.basicConfig(level=logging.INFO)
    logger = logging.getLogger(__name__)

    PAYMENT_URL = os.getenv("PAYMENT_SERVICE_URL", "http://payment-service:8081")
    INVENTORY_URL = os.getenv("INVENTORY_SERVICE_URL", "http://inventory-service:8082")

    @app.route("/health")
    def health():
        return jsonify({"status": "healthy"})

    @app.route("/orders", methods=["POST"])
    def create_order():
        """
        Create an order:
        1. Validate the request
        2. Call Payment Service to process payment
        3. Call Inventory Service to reserve items
        """
        data = request.get_json()
        order_id = f"ORD-{random.randint(1000, 9999)}"

        logger.info(f"Creating order {order_id}: {data}")

        # Step 1: Validate
        time.sleep(random.uniform(0.005, 0.02))  # Simulate validation

        if not data or "item" not in data:
            return jsonify({"error": "Invalid order: missing 'item'"}), 400

        # Step 2: Call Payment Service
        try:
            payment_resp = requests.post(
                f"{PAYMENT_URL}/process",
                json={
                    "order_id": order_id,
                    "amount": data.get("amount", 0),
                },
                timeout=5,
            )
            if payment_resp.status_code != 200:
                return jsonify({
                    "error": "Payment failed",
                    "details": payment_resp.json(),
                }), 402
        except requests.exceptions.RequestException as e:
            logger.error(f"Payment service error: {e}")
            return jsonify({"error": "Payment service unavailable"}), 503

        # Step 3: Call Inventory Service
        try:
            inventory_resp = requests.post(
                f"{INVENTORY_URL}/reserve",
                json={
                    "order_id": order_id,
                    "item": data.get("item"),
                    "quantity": data.get("quantity", 1),
                },
                timeout=5,
            )
            if inventory_resp.status_code != 200:
                return jsonify({
                    "error": "Inventory reservation failed",
                    "details": inventory_resp.json(),
                }), 409
        except requests.exceptions.RequestException as e:
            logger.error(f"Inventory service error: {e}")
            return jsonify({"error": "Inventory service unavailable"}), 503

        return jsonify({
            "order_id": order_id,
            "status": "confirmed",
            "item": data.get("item"),
            "quantity": data.get("quantity", 1),
            "payment": payment_resp.json(),
            "inventory": inventory_resp.json(),
        }), 201

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=8080)
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: demo
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: order-service
