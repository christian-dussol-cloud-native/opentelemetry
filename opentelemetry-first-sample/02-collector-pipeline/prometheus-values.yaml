# =============================================================================
# Prometheus - Helm Values for OTel Learning Lab
# =============================================================================
server:
  retention: "2d"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Scrape OTel Collector's Prometheus exporter
  extraScrapeConfigs: |
    - job_name: 'otel-collector-metrics'
      scrape_interval: 15s
      static_configs:
        - targets: ['otel-collector-opentelemetry-collector.observability.svc.cluster.local:8889']

alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: false
