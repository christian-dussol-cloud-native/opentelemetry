# =============================================================================
# Grafana - Helm Values for OTel Learning Lab
# =============================================================================
adminUser: admin
adminPassword: admin

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.observability.svc.cluster.local:80
        isDefault: true
      - name: Jaeger
        type: jaeger
        url: http://jaeger-query.observability.svc.cluster.local:16686

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
