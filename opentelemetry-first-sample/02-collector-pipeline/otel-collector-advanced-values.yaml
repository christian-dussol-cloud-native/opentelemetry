# =============================================================================
# OpenTelemetry Collector - Advanced Pipeline Configuration
# =============================================================================
# Multi-backend: Jaeger (traces) + Prometheus (metrics) + Debug (logs)
# Includes: filtering, batching, attributes enrichment
# =============================================================================

mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.96.0"

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8887
    servicePort: 8887
    protocol: TCP

config:
  # --- RECEIVERS ---
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  # --- PROCESSORS ---
  processors:
    # Memory protection
    memory_limiter:
      check_interval: 1s
      limit_mib: 512
      spike_limit_mib: 128

    # Batch for performance
    batch:
      timeout: 5s
      send_batch_size: 1024
      send_batch_max_size: 2048

    # Filter out health check spans (noise reduction)
    filter/health:
      error_mode: ignore
      traces:
        span:
          - 'attributes["http.route"] == "/healthz"'
          - 'attributes["http.route"] == "/readyz"'
          - 'attributes["http.route"] == "/livez"'

    # Enrich all telemetry with environment info
    attributes/env:
      actions:
        - key: environment
          value: "learning-lab"
          action: upsert
        - key: cluster
          value: "otel-lab"
          action: upsert

    # Add K8s resource attributes
    resource:
      attributes:
        - key: deployment.environment
          value: "development"
          action: upsert

  # --- EXPORTERS ---
  exporters:
    # Debug output (visible in Collector logs)
    debug:
      verbosity: basic

    # Jaeger for distributed traces
    otlp/jaeger:
      endpoint: jaeger-collector.observability.svc.cluster.local:4317
      tls:
        insecure: true

    # Prometheus metrics endpoint (pull-based)
    prometheus:
      endpoint: 0.0.0.0:8889
      namespace: otel
      resource_to_telemetry_conversion:
        enabled: true

  # --- PIPELINES ---
  service:
    telemetry:
      logs:
        level: info
      metrics:
        level: basic
        address: 0.0.0.0:8887
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, filter/health, attributes/env, batch]
        exporters: [otlp/jaeger, debug]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, attributes/env, batch]
        exporters: [prometheus, debug]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [debug]

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 512Mi
